# Local development services for Tickertea. See docs/architecture/09-local-development.md.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tickertea
      POSTGRES_USER: tickertea_admin
      POSTGRES_PASSWORD: tickertea
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tickertea
      MINIO_ROOT_PASSWORD: tickertea-secret
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

volumes:
  pgdata:
  miniodata:
